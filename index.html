<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Deep Chat - 私人 AI 对话与讨论平台">
  <title>Deep Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ==================== 登录界面 ==================== -->
  <div id="login-container">
    <h2>Deep Chat</h2>
    <div class="input-group">
      <label for="nickname-input">昵称</label>
      <input type="text" id="nickname-input" placeholder="输入昵称" autocomplete="off" aria-label="昵称">
    </div>
    <div class="input-group">
      <label for="password-input">密码</label>
      <input type="password" id="password-input" placeholder="输入密码" aria-label="密码">
    </div>
    <button id="login-btn" aria-label="登录">
      <span class="btn-text">登录</span>
      <span class="btn-loader hidden"></span>
    </button>
    <div id="login-error" role="alert"></div>
  </div>

  <!-- ==================== 主界面 ==================== -->
  <div id="app-container" class="hidden">
    
    <!-- ---------- 左侧面板 ---------- -->
    <aside id="left-panel">
      <div id="user-info">
        <img id="avatar-small" src="" alt="avatar">
        <span id="nickname-display"></span>
        <button id="logout-btn" title="退出登录" aria-label="退出登录">⏻</button>
      </div>
      
      <div id="api-info">
        <div class="info-title">🔧 API 状态</div>
        <div class="info-item"><span>模型</span><span id="api-model">deepseek-v4-pro</span></div>
        <div class="info-item"><span>API URL</span><span id="api-url">Loading...</span></div>
        <div class="info-item"><span>消息轮次</span><span id="api-rounds">0</span></div>
        <div class="info-item"><span>最后请求</span><span id="api-last-time">—</span></div>
        <div class="info-item"><span>响应状态</span><span id="api-status">—</span></div>
        <div class="info-item"><span>最后回复长度</span><span id="api-resp-len">—</span></div>
        
        <div id="api-actions">
          <div id="api-test-status" class="api-status-message hidden"></div>
          <div class="actions-row">
            <button id="model-select-btn" class="api-action-btn" aria-label="切换模型">
              <span class="btn-icon">◈</span> 模型
            </button>
            <button id="api-test-btn" class="api-action-btn" aria-label="测试 API">
              <span class="btn-icon">▣</span> 测试
            </button>
          </div>
          <!-- 新增：更多设置按钮，宽度 = 模型 + 测试 -->
          <div class="actions-row actions-row-full">
            <button id="api-settings-btn" class="api-action-btn api-settings-btn" aria-label="更多设置">
              <span class="btn-icon">⚙</span> 更多设置
            </button>
          </div>
        </div>
      </div>
      
      <!-- 日志区（设置展开时隐藏） -->
      <div id="log-area">
        <div class="log-title">日志</div>
        <div id="log-content"></div>
      </div>
      
      <!-- 新增：高级设置面板（展开时取代日志区） -->
      <div id="api-settings-panel" class="hidden">
        <div class="settings-header">
          <span>⚙ 高级设置 — <span id="settings-model-name">DeepSeek V4 Pro</span></span>
          <button id="settings-close-btn" class="settings-close" aria-label="关闭设置">✕</button>
        </div>
        <div id="settings-content"></div>
        <div class="settings-footer">
          <button id="settings-reset-btn" class="api-action-btn">↺ 恢复默认</button>
        </div>
      </div>
    </aside>

    <!-- ---------- 中间对话面板 ---------- -->
    <main id="chat-panel">
      <div id="chat-messages"></div>
      <div id="input-area">
        <textarea 
          id="user-input" 
          rows="1" 
          placeholder="输入消息，Enter 发送，Shift+Enter 换行"
          aria-label="消息输入框"
        ></textarea>
        <button id="send-btn" aria-label="发送">
          <span class="btn-text">发送</span>
          <span class="btn-loader hidden"></span>
        </button>
      </div>
    </main>

    <!-- ---------- 右侧讨论区 ---------- -->
    <aside id="discussion-panel">
      <div id="discussion-header">
        <h3>讨论区</h3>
      </div>
      <div id="discussion-messages"></div>
      <div id="discussion-input-area">
        <textarea 
          id="discussion-input" 
          rows="1" 
          placeholder="说点什么...（Enter 发送，Shift+Enter 换行）"
          aria-label="讨论区输入框"
        ></textarea>
        <button id="send-discussion-btn" aria-label="发送讨论消息">发送</button>
      </div>
    </aside>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
